server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: drishti-kon-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/drishti_kon}
    username: ${SPRING_DATASOURCE_USERNAME:drishti}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:TmV2ZXJVc2VUaGlzSW5Qcm9kR2VuZXJhdGVBUmVhbDI1NkJpdEtleQ==}
    expiration-ms: 86400000 # 24 hours
  otp:
    expiry-minutes: 5
    max-attempts: 5
  auth:
    allowed-domain: aitpune.edu.in
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL:noreply@aitpune.edu.in}
    from-name: DrishtiKon

logging:
  level:
    com.drishti.kon: DEBUG
