server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: drishti-kon-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/drishti_kon}
    username: ${SPRING_DATASOURCE_USERNAME:drishti}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    com.drishti.kon: DEBUG
