server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: drishti-kon-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:TmV2ZXJVc2VUaGlzSW5Qcm9kR2VuZXJhdGVBUmVhbDI1NkJpdEtleQ==}
    expiration-ms: 86400000 # 24 hours
  otp:
    expiry-minutes: 5
    max-attempts: 5
  auth:
    allowed-domain: aitpune.edu.in
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
    additional-origins: ${ADDITIONAL_ORIGINS:}
  moderators:
    # Comma-separated list of emails that receive the MODERATOR role on startup.
    # Override per-environment or supply via MODERATOR_EMAILS env var.
    emails: ${MODERATOR_EMAILS:}
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: ${SENDGRID_FROM_EMAIL:noreply@aitpune.edu.in}
    from-name: DrishtiKon

logging:
  level:
    com.drishti.kon: DEBUG
