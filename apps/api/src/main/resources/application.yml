server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: drishti-kon-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SES_SMTP_HOST:email-smtp.eu-north-1.amazonaws.com}
    port: ${SES_SMTP_PORT:465}
    username: ${SES_SMTP_USERNAME}
    password: ${SES_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 2592000000 # 30 days
  otp:
    expiry-minutes: 5
    max-attempts: 5
  auth:
    allowed-domain: aitpune.edu.in
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
    additional-origins: ${ADDITIONAL_ORIGINS:}
  mail:
    from-email: ${MAIL_FROM_EMAIL:no-reply@break-n-continue.live}

logging:
  level:
    com.drishti.kon: DEBUG
