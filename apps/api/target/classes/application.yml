server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: drishti-kon-api

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/drishti_kon
    username: drishti
    password: password
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none # Use Flyway for migrations
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Mail Configuration (for OTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Security Configuration
  security:
    jwt:
      secret: ${JWT_SECRET:drishti-kon-secret-key-change-in-production}
      expiration: 86400000 # 24 hours

  # DevTools (disabled in production)
  devtools:
    livereload:
      enabled: false

# Application specific configuration
app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:3001"

  email:
    domain: "@aitpune.edu.in"
    otp:
      expiry-minutes: 10
      length: 6

  admin:
    default-email: "admin@aitpune.edu.in"

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging Configuration
logging:
  level:
    com.drishti.kon: INFO
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
# Development Profile
spring:
  config:
    activate:
      on-profile: development

  jpa:
    show-sql: true

  logging:
    level:
      com.drishti.kon: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: production

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/drishti_kon}
    username: ${DATABASE_USERNAME:drishti}
    password: ${DATABASE_PASSWORD:password}

  security:
    jwt:
      secret: ${JWT_SECRET}

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
