services:
  postgres:
    image: postgres:15-alpine
    container_name: drishti-db
    environment:
      POSTGRES_DB: drishti_kon
      POSTGRES_USER: drishti
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drishti -d drishti_kon"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./apps/api
    container_name: drishti-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drishti_kon
      SPRING_DATASOURCE_USERNAME: drishti
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      target: dev
    container_name: drishti-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src

volumes:
  postgres_data:
