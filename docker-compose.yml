services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: drishti-kon-db
    environment:
      POSTGRES_DB: drishti_kon
      POSTGRES_USER: drishti
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - drishti-kon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drishti -d drishti_kon"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: drishti-kon-api
    environment:
      SPRING_PROFILES_ACTIVE: development
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/drishti_kon
      SPRING_DATASOURCE_USERNAME: drishti
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: your-jwt-secret-key-here
      MAIL_USERNAME: your-email@gmail.com
      MAIL_PASSWORD: your-app-password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - drishti-kon-network
    volumes:
      - ./apps/api/logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--spider",
          "http://localhost:8080/api/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Next.js Web App
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    container_name: drishti-kon-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - drishti-kon-network
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # Redis (for session management, optional)
  redis:
    image: redis:7-alpine
    container_name: drishti-kon-redis
    ports:
      - "6379:6379"
    networks:
      - drishti-kon-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Nginx (for production reverse proxy, optional)
  nginx:
    image: nginx:alpine
    container_name: drishti-kon-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - api
    networks:
      - drishti-kon-network
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  drishti-kon-network:
    driver: bridge
