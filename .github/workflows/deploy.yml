name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-web

jobs:
  # ─── Build & Push API Image ────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

  # ─── Build & Push Web Image ────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

  # ─── Deploy to EC2 ─────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    steps:
      - name: Install Docker on EC2 (if missing)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
              echo "Docker installed successfully."
            else
              echo "Docker already installed: $(docker --version)"
            fi

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: API_IMAGE,WEB_IMAGE
          script: |
            set -e

            # Use sudo if user is not in docker group yet (first run)
            DOCKER="docker"
            if ! docker info &>/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi

            # ── Pull latest images (force fresh pull) ──
            $DOCKER pull ${{ env.API_IMAGE }}:latest
            $DOCKER pull ${{ env.WEB_IMAGE }}:latest

            # ── Create shared network if it doesn't exist ──
            $DOCKER network create drishti-kon-network 2>/dev/null || true

            # ── PostgreSQL (persistent, only recreated if missing) ──
            if $DOCKER ps --format '{{.Names}}' | grep -q drishti-kon-db; then
              echo "PostgreSQL is already running."
            elif $DOCKER ps -a --format '{{.Names}}' | grep -q drishti-kon-db; then
              echo "PostgreSQL container exists but stopped. Removing and recreating..."
              $DOCKER rm -f drishti-kon-db
              $DOCKER run -d \
                --name drishti-kon-db \
                --network drishti-kon-network \
                --restart unless-stopped \
                -e POSTGRES_DB=drishti_kon \
                -e POSTGRES_USER=drishti \
                -e POSTGRES_PASSWORD=drishtiKon@2026secure \
                -v pgdata:/var/lib/postgresql/data \
                -p 5432:5432 \
                postgres:15-alpine
              echo "Waiting for PostgreSQL to be ready..."
              sleep 15
            else
              echo "Starting PostgreSQL for the first time..."
              $DOCKER run -d \
                --name drishti-kon-db \
                --network drishti-kon-network \
                --restart unless-stopped \
                -e POSTGRES_DB=drishti_kon \
                -e POSTGRES_USER=drishti \
                -e POSTGRES_PASSWORD=drishtiKon@2026secure \
                -v pgdata:/var/lib/postgresql/data \
                -p 5432:5432 \
                postgres:15-alpine
              echo "Waiting for PostgreSQL to be ready..."
              sleep 15
            fi

            # ── API (Spring Boot) — always redeploy with latest ──
            $DOCKER rm -f drishti-kon-api 2>/dev/null || true
            $DOCKER run -d \
              --name drishti-kon-api \
              --network drishti-kon-network \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=production \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://drishti-kon-db:5432/drishti_kon \
              -e SPRING_DATASOURCE_USERNAME=drishti \
              -e SPRING_DATASOURCE_PASSWORD=drishtiKon@2026secure \
              -e JWT_SECRET=d8f2a1b7c9e04563af8d2e1b7c9a0456d8f2a1b7c9e04563af8d2e1b \
              -e MAIL_USERNAME=noreply.drishti@gmail.com \
              -e MAIL_PASSWORD=placeholder-app-password \
              -p 8080:8080 \
              ${{ env.API_IMAGE }}:latest

            # ── Web (Next.js) — always redeploy with latest ──
            $DOCKER rm -f drishti-kon-web 2>/dev/null || true
            $DOCKER run -d \
              --name drishti-kon-web \
              --network drishti-kon-network \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e API_BASE_URL=http://drishti-kon-api:8080 \
              -e NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:8080/api \
              -p 3000:3000 \
              ${{ env.WEB_IMAGE }}:latest

            # ── Cleanup old/dangling images ──
            $DOCKER image prune -f

            echo "Deployment complete!"
            echo "API  → http://${{ secrets.EC2_HOST }}:8080/api/health"
            echo "Web  → http://${{ secrets.EC2_HOST }}:3000"
