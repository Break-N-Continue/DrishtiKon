name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-web

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.API_IMAGE }}:latest

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          target: runner
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            DOCKER="docker"
            if ! docker info &>/dev/null 2>&1; then DOCKER="sudo docker"; fi

            $DOCKER pull ${{ env.API_IMAGE }}:latest
            $DOCKER pull ${{ env.WEB_IMAGE }}:latest

            $DOCKER network create drishti-network 2>/dev/null || true

            # Postgres (keep running if already up)
            if ! $DOCKER ps --format '{{.Names}}' | grep -q drishti-db; then
              $DOCKER rm -f drishti-db 2>/dev/null || true
              $DOCKER run -d --name drishti-db --network drishti-network --restart unless-stopped \
                -e POSTGRES_DB=drishti_kon -e POSTGRES_USER=drishti \
                -e POSTGRES_PASSWORD=password \
                -v pgdata:/var/lib/postgresql/data postgres:15-alpine
              sleep 10
            fi

            # Stop and remove old app containers
            $DOCKER stop drishti-api drishti-web 2>/dev/null || true
            $DOCKER rm -f drishti-api drishti-web 2>/dev/null || true
            sleep 3

            # Kill anything still holding ports 8080/3000
            sudo fuser -k 8080/tcp 2>/dev/null || true
            sudo fuser -k 3000/tcp 2>/dev/null || true
            sleep 1

            # API
            $DOCKER run -d --name drishti-api --network drishti-network --restart unless-stopped \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://drishti-db:5432/drishti_kon \
              -e SPRING_DATASOURCE_USERNAME=drishti \
              -e SPRING_DATASOURCE_PASSWORD=password \
              -p 8080:8080 ${{ env.API_IMAGE }}:latest

            # Web
            $DOCKER run -d --name drishti-web --network drishti-network --restart unless-stopped \
              -e NODE_ENV=production \
              -e API_BASE_URL=http://drishti-api:8080 \
              -e NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:8080/api \
              -p 3000:3000 ${{ env.WEB_IMAGE }}:latest

            $DOCKER image prune -f
            echo "Deployed! API → :8080/api/health | Web → :3000"
