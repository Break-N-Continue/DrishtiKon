name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-web

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.API_IMAGE }}:latest

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          target: runner
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest
