name: Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-api
  WEB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/drishti-kon-web

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.API_IMAGE }}:latest

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          target: runner
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            DOCKER="docker"
            if ! docker info &>/dev/null 2>&1; then DOCKER="sudo docker"; fi

            $DOCKER pull ${{ env.API_IMAGE }}:latest
            $DOCKER pull ${{ env.WEB_IMAGE }}:latest

            $DOCKER network create drishti-network 2>/dev/null || true

            # Stop and remove old app containers (by name)
            $DOCKER stop drishti-api drishti-web 2>/dev/null || true
            $DOCKER rm -f drishti-api drishti-web 2>/dev/null || true

            # Also kill any container using ports 8080 or 3000 (regardless of name)
            for port in 8080 3000; do
              cid=$($DOCKER ps -q --filter "publish=$port" 2>/dev/null)
              if [ -n "$cid" ]; then
                $DOCKER stop $cid 2>/dev/null || true
                $DOCKER rm -f $cid 2>/dev/null || true
              fi
            done

            # Last resort: kill any process on these ports
            sudo fuser -k 8080/tcp 2>/dev/null || true
            sudo fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            # API - connects to AWS RDS (no local Postgres needed)
            $DOCKER run -d --name drishti-api --network drishti-network --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e RDS_HOST=${{ secrets.RDS_HOST }} \
              -e RDS_PORT=${{ secrets.RDS_PORT }} \
              -e RDS_DB_NAME=${{ secrets.RDS_DB_NAME }} \
              -e RDS_USERNAME=${{ secrets.RDS_USERNAME }} \
              -e RDS_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }} \
              -e SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }} \
              -e FRONTEND_URL=${{ secrets.FRONTEND_URL }} \
              -p 8080:8080 ${{ env.API_IMAGE }}:latest

            # Web
            $DOCKER run -d --name drishti-web --network drishti-network --restart unless-stopped \
              -e NODE_ENV=production \
              -e API_BASE_URL=http://drishti-api:8080 \
              -p 3000:3000 ${{ env.WEB_IMAGE }}:latest

            $DOCKER image prune -f
            echo "Deployed! API → :8080/api/health | Web → :3000"
